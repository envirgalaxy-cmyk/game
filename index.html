<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MindFresh Adventure - Unique Platform Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#07111f;color:#fff;font-family:Arial,sans-serif;touch-action:none;user-select:none}
.gameShell{width:100vw;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:8px;background:radial-gradient(circle at top,#123b5d,#07111f 55%,#020617)}
.header{width:min(100%,980px);display:flex;align-items:center;justify-content:space-between;gap:10px}
.title{font-size:22px;font-weight:900;color:#38e8ff;text-shadow:0 0 16px #00e5ff;white-space:nowrap}
.menu{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.menu button,.touchBtn{border:0;cursor:pointer;font-weight:900;color:#07111f;background:linear-gradient(135deg,#38e8ff,#facc15);box-shadow:0 0 18px rgba(56,232,255,.35)}
.menu button{padding:9px 14px;border-radius:999px}
#game{width:960px;height:520px;max-width:98vw;max-height:64vh;border:3px solid #38e8ff;border-radius:18px;background:#000;box-shadow:0 0 30px rgba(56,232,255,.5)}
.info{font-size:13px;color:#b8d4e8;text-align:center}.info b{color:#facc15}
.mobilePad{display:none;width:min(100%,780px);align-items:center;justify-content:space-between;padding:5px 10px;gap:12px}.padGroup{display:flex;align-items:center;gap:12px}.touchBtn{width:70px;height:70px;border-radius:50%;font-size:28px;border:2px solid rgba(255,255,255,.35);color:#fff;background:rgba(56,232,255,.22);touch-action:none}.jumpBtn{width:92px;height:92px;font-size:18px;background:rgba(250,204,21,.26)}.dashBtn{width:70px;height:70px;font-size:16px;background:rgba(34,197,94,.25)}
@media(max-width:820px){.gameShell{justify-content:flex-start;padding:6px}.header{flex-direction:column;gap:6px}.title{font-size:17px}.menu button{padding:7px 11px;font-size:12px}#game{width:100vw;height:auto;max-height:54vh;border-radius:10px;border-width:2px}.mobilePad{display:flex}.info{font-size:11px}.touchBtn{width:64px;height:64px}.jumpBtn{width:88px;height:88px}}
@media(max-height:650px){.title{font-size:15px}.menu button{padding:6px 10px}.info{display:none}.touchBtn{width:58px;height:58px}.jumpBtn{width:78px;height:78px}#game{max-height:50vh}}
</style>
</head>
<body>
<div class="gameShell">
  <div class="header">
    <div class="title">🌟 MindFresh Adventure</div>
    <div class="menu">
      <button onclick="restartGame()">Restart</button>
      <button onclick="togglePause()">Pause</button>
      <button onclick="toggleMute()" id="muteBtn">Sound On</button>
      <button onclick="randomMap()">Random Map</button>
    </div>
  </div>
  <canvas id="game" width="960" height="520"></canvas>
  <div class="mobilePad">
    <div class="padGroup">
      <button class="touchBtn" id="leftBtn">⬅</button>
      <button class="touchBtn" id="rightBtn">➡</button>
    </div>
    <div class="padGroup">
      <button class="touchBtn dashBtn" id="dashBtn">RUN</button>
      <button class="touchBtn jumpBtn" id="jumpBtn">JUMP</button>
    </div>
  </div>
  <p class="info">Keyboard: <b>A/D</b> or <b>←/→</b>, Jump: <b>Space/W/↑</b>, Run/Fire: <b>Shift/Ctrl</b>, Pause: <b>P</b>, Mute: <b>M</b></p>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W=960,H=520,frame=0,cameraX=0,level=1,score=0,coins=0,lives=3,gameState='playing',muted=false,levelChanging=false,seed=7;
const keys={left:false,right:false,dash:false};
const gravity=.72;
const player={x:80,y:290,w:42,h:58,vx:0,vy:0,speed:4.2,jump:-14.5,grounded:false,big:false,fire:false,star:0,dir:1,shootCooldown:0,inv:0};
let platforms=[],blocks=[],coinList=[],enemies=[],powerups=[],shots=[],flag={},levelLength=0;
const worlds=[
{name:'Fresh Valley',top:'#34d399',mid:'#38bdf8',bot:'#052e16',ground:'#22c55e',dirt:'#713f12'},
{name:'Candy Sunset',top:'#fb7185',mid:'#f59e0b',bot:'#312e81',ground:'#a3e635',dirt:'#854d0e'},
{name:'Crystal Cave',top:'#0f172a',mid:'#334155',bot:'#020617',ground:'#06b6d4',dirt:'#164e63'},
{name:'Sand Sprint',top:'#fde047',mid:'#f97316',bot:'#7c2d12',ground:'#eab308',dirt:'#92400e'},
{name:'Neon Forest',top:'#16a34a',mid:'#14532d',bot:'#022c22',ground:'#22c55e',dirt:'#3f6212'},
{name:'Snow Pop',top:'#e0f2fe',mid:'#93c5fd',bot:'#1e3a8a',ground:'#f8fafc',dirt:'#94a3b8'},
{name:'Lava Rush',top:'#7f1d1d',mid:'#dc2626',bot:'#111827',ground:'#ef4444',dirt:'#450a0a'},
{name:'Purple Orbit',top:'#4c1d95',mid:'#7c3aed',bot:'#020617',ground:'#8b5cf6',dirt:'#312e81'},
{name:'Ocean Hill',top:'#06b6d4',mid:'#0284c7',bot:'#082f49',ground:'#14b8a6',dirt:'#164e63'},
{name:'Final Galaxy',top:'#020617',mid:'#111827',bot:'#000',ground:'#00e5ff',dirt:'#1e293b'}
];
function rnd(){seed=(seed*9301+49297)%233280;return seed/233280}
function beep(f=440,d=.08,type='sine',vol=.08){if(muted)return;try{const ac=new (window.AudioContext||window.webkitAudioContext)(),o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;o.type=type;g.gain.value=vol;o.connect(g);g.connect(ac.destination);o.start();setTimeout(()=>{o.stop();ac.close()},d*1000)}catch(e){}}
function createLevel(lv,random=false){seed=random?Math.floor(Math.random()*99999):lv*101+9;levelLength=3600+lv*620;platforms=[];blocks=[];coinList=[];enemies=[];powerups=[];shots=[];let x=0;while(x<levelLength){let w=480-lv*9;if(w<330)w=330;platforms.push({x,y:455,w,h:65,type:'ground'});if(lv>2&&rnd()>.72)platforms.push({x:x+w+50,y:405,w:70,h:28,type:'bridge'});x+=w+140+lv*20+Math.floor(rnd()*90)}
for(let i=0;i<14+lv*3;i++){let px=330+i*(245+lv*15)+Math.floor(rnd()*80),py=365-(i%5)*(34+lv);if(py<165)py=240+(i%3)*45;let pw=150-lv*3;if(pw<95)pw=95;platforms.push({x:px,y:py,w:pw,h:22,type:'float'});coinList.push({x:px+25,y:py-38,taken:false});coinList.push({x:px+pw-25,y:py-62,taken:false});if(i%3===0)blocks.push({x:px+pw/2-18,y:py-92,w:36,h:36,hit:false,kind:i%6===0?'power':'coin'});}
for(let i=0;i<6+lv*2;i++){let ex=600+i*(360+lv*12)+Math.floor(rnd()*90);enemies.push({x:ex,y:415,w:42,h:40,vx:1.2+lv*.28,min:ex-120,max:ex+170,alive:true,type:i%4===0?'spike':'bug'});}
if(lv>=4){for(let i=0;i<lv;i++){let ex=1100+i*500;enemies.push({x:ex,y:295-(i%3)*40,w:38,h:34,vx:1.6+lv*.25,min:ex-120,max:ex+160,alive:true,type:'fly'});}}
flag={x:levelLength-160,y:275,w:34,h:180};player.x=80;player.y=280;player.vx=0;player.vy=0;player.grounded=false;cameraX=0;levelChanging=false;}
createLevel(level);
function restartGame(){level=1;score=0;coins=0;lives=3;gameState='playing';player.big=false;player.fire=false;player.star=0;player.inv=0;createLevel(level)}
function randomMap(){level=1;score=0;coins=0;lives=3;gameState='playing';createLevel(level,true)}
function togglePause(){if(gameState==='playing')gameState='pause';else if(gameState==='pause')gameState='playing'}
function toggleMute(){muted=!muted;document.getElementById('muteBtn').textContent=muted?'Sound Off':'Sound On'}
function jump(){if(gameState==='over'||gameState==='winner'){restartGame();return}if(gameState!=='playing')return;if(player.grounded){player.vy=player.jump;player.grounded=false;beep(520,.07,'square')}}
function shoot(){if(!player.fire||player.shootCooldown>0)return;shots.push({x:player.x+player.w/2,y:player.y+25,vx:player.dir*8,vy:-2,w:12,h:12});player.shootCooldown=22;beep(760,.05,'triangle')}
function rect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
document.addEventListener('keydown',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')keys.left=true;if(e.code==='ArrowRight'||e.code==='KeyD')keys.right=true;if(e.code==='ShiftLeft'||e.code==='ShiftRight')keys.dash=true;if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')jump();if(e.code==='ControlLeft'||e.code==='ControlRight')shoot();if(e.code==='KeyP')togglePause();if(e.code==='KeyM')toggleMute()});
document.addEventListener('keyup',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')keys.left=false;if(e.code==='ArrowRight'||e.code==='KeyD')keys.right=false;if(e.code==='ShiftLeft'||e.code==='ShiftRight')keys.dash=false});
function bindHold(id,key){const b=document.getElementById(id);['pointerdown','touchstart','mousedown'].forEach(ev=>b.addEventListener(ev,e=>{e.preventDefault();keys[key]=true},{passive:false}));['pointerup','pointercancel','pointerleave','touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>b.addEventListener(ev,e=>{e.preventDefault();keys[key]=false},{passive:false}))}
bindHold('leftBtn','left');bindHold('rightBtn','right');bindHold('dashBtn','dash');document.getElementById('jumpBtn').addEventListener('pointerdown',e=>{e.preventDefault();jump()});document.getElementById('dashBtn').addEventListener('dblclick',shoot);
function updatePlayer(){if(player.shootCooldown>0)player.shootCooldown--;if(player.star>0)player.star--;if(player.inv>0)player.inv--;let sp=player.speed+(keys.dash?2.2:0);if(keys.left){player.vx=-sp;player.dir=-1}else if(keys.right){player.vx=sp;player.dir=1}else player.vx*=.78;player.vy+=gravity;player.x+=player.vx;player.y+=player.vy;player.grounded=false;
for(const p of platforms){if(rect(player,p)){if(player.vy>0&&player.y+player.h-player.vy<=p.y+4){player.y=p.y-player.h;player.vy=0;player.grounded=true}else if(player.vy<0&&player.y-player.vy>=p.y+p.h-4){player.y=p.y+p.h;player.vy=0}}}
for(const b of blocks){if(rect(player,b)&&player.vy<0&&player.y-player.vy>=b.y+b.h-6){player.y=b.y+b.h;player.vy=1;if(!b.hit){b.hit=true;if(b.kind==='coin'){score+=50;coins++;beep(900,.08,'sine')}else{powerups.push({x:b.x+4,y:b.y-32,w:28,h:28,vx:1.4,vy:0,type:player.big?'flower':'mushroom'});beep(400,.1,'square')}}}}
if(player.y>700)loseLife();if(player.x<0)player.x=0;if(player.x>levelLength)player.x=levelLength;cameraX=player.x-250;if(cameraX<0)cameraX=0;if(cameraX>levelLength-W)cameraX=levelLength-W;}
function updateCoins(){for(const c of coinList){if(c.taken)continue;let dx=player.x+player.w/2-c.x,dy=player.y+player.h/2-c.y;if(Math.hypot(dx,dy)<42){c.taken=true;coins++;score+=10;beep(880,.05,'sine')}}}
function updatePowerups(){for(const po of powerups){po.vy+=gravity*.4;po.x+=po.vx;po.y+=po.vy;for(const p of platforms){if(rect(po,p)&&po.vy>0){po.y=p.y-po.h;po.vy=0}}if(rect(player,po)){if(po.type==='mushroom'){player.big=true;player.h=74;score+=200;beep(520,.18,'triangle')}else{player.fire=true;score+=300;beep(620,.18,'triangle')}po.taken=true}}powerups=powerups.filter(p=>!p.taken&&p.y<650)}
function updateShots(){for(const s of shots){s.x+=s.vx;s.vy+=.22;s.y+=s.vy;for(const p of platforms){if(rect(s,p)){s.vy=-5;s.y=p.y-s.h}}for(const e of enemies){if(e.alive&&rect(s,e)){e.alive=false;s.hit=true;score+=80;beep(260,.08,'sawtooth')}}}shots=shots.filter(s=>!s.hit&&s.x>cameraX-50&&s.x<cameraX+1050)}
function updateEnemies(){for(const e of enemies){if(!e.alive)continue;e.x+=e.vx;if(e.x<e.min||e.x>e.max)e.vx*=-1;if(e.type==='fly')e.y+=Math.sin(frame*.05+e.x*.01)*.8;if(rect(player,e)){if(player.star>0){e.alive=false;score+=100;beep(330,.05,'square')}else if(player.vy>0&&player.y+player.h-player.vy<e.y+14){e.alive=false;player.vy=-10;score+=60;beep(220,.08,'square')}else hitPlayer()}}}
function hitPlayer(){if(player.inv>0)return;if(player.fire){player.fire=false;player.inv=90;beep(180,.12,'sawtooth');return}if(player.big){player.big=false;player.h=58;player.inv=90;beep(180,.12,'sawtooth');return}loseLife()}
function loseLife(){if(gameState!=='playing')return;lives--;beep(120,.2,'sawtooth');if(lives<=0){gameState='over';return}player.x=Math.max(80,cameraX+60);player.y=220;player.vx=0;player.vy=0;player.inv=120;}
function checkFlag(){if(rect(player,flag)&&!levelChanging){levelChanging=true;beep(980,.2,'triangle');if(level>=10)gameState='winner';else{gameState='levelComplete';setTimeout(()=>{level++;lives=3;createLevel(level);gameState='playing'},1300)}}}
function update(){if(gameState!=='playing')return;updatePlayer();updateCoins();updatePowerups();updateShots();updateEnemies();checkFlag()}
function bg(){const t=worlds[level-1];let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,t.top);g.addColorStop(.55,t.mid);g.addColorStop(1,t.bot);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.75)';for(let i=0;i<70;i++){if(level===3||level===8||level===10)ctx.fillRect((i*97+frame*.25)%W,(i*49)%250,2,2)}ctx.fillStyle='rgba(255,255,255,.6)';if(level!==3&&level!==8&&level!==10){for(let i=0;i<7;i++)cloud((i*240-cameraX*.22)%1150,70+(i%3)*45)}for(let i=0;i<14;i++){let x=i*300-cameraX*.35;ctx.fillStyle='rgba(15,118,110,.32)';ctx.beginPath();ctx.moveTo(x,455);ctx.quadraticCurveTo(x+150,310,x+300,455);ctx.fill()}}
function cloud(x,y){ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);ctx.arc(x+32,y-12,30,0,Math.PI*2);ctx.arc(x+68,y,24,0,Math.PI*2);ctx.fill()}
function drawPlatforms(){const t=worlds[level-1];for(const p of platforms){let x=p.x-cameraX;ctx.fillStyle=t.ground;round(x,p.y,p.w,p.h,8,true);ctx.fillStyle=t.dirt;ctx.fillRect(x,p.y+16,p.w,p.h-16);ctx.fillStyle='rgba(255,255,255,.28)';ctx.fillRect(x,p.y,p.w,5)}}
function drawBlocks(){for(const b of blocks){let x=b.x-cameraX;ctx.fillStyle=b.hit?'#64748b':'#f59e0b';round(x,b.y,b.w,b.h,7,true);ctx.fillStyle='#fff';ctx.font='24px Arial';ctx.fillText(b.hit?'•':'?',x+11,b.y+26)}}
function drawCoins(){for(const c of coinList){if(c.taken)continue;let x=c.x-cameraX,y=c.y+Math.sin(frame*.1)*5;ctx.save();ctx.shadowColor='#facc15';ctx.shadowBlur=12;ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(x,y,13,0,Math.PI*2);ctx.fill();ctx.fillStyle='#92400e';ctx.font='15px Arial';ctx.fillText('₹',x-5,y+5);ctx.restore()}}
function drawPowerups(){for(const p of powerups){let x=p.x-cameraX;ctx.fillStyle=p.type==='flower'?'#fb7185':'#22c55e';round(x,p.y,p.w,p.h,8,true);ctx.fillStyle='#fff';ctx.font='18px Arial';ctx.fillText(p.type==='flower'?'✦':'▲',x+6,p.y+21)}}
function drawShots(){ctx.fillStyle='#f97316';for(const s of shots){let x=s.x-cameraX;ctx.beginPath();ctx.arc(x,s.y,7,0,Math.PI*2);ctx.fill()}}
function drawEnemies(){for(const e of enemies){if(!e.alive)continue;let x=e.x-cameraX,y=e.y;ctx.fillStyle=e.type==='fly'?'#7c3aed':e.type==='spike'?'#ef4444':'#7c2d12';round(x,y,e.w,e.h,10,true);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x+12,y+13,5,0,Math.PI*2);ctx.arc(x+30,y+13,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.arc(x+13,y+14,2,0,Math.PI*2);ctx.arc(x+31,y+14,2,0,Math.PI*2);ctx.fill();if(e.type==='spike'){ctx.fillStyle='#fff';for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(x+7+i*12,y);ctx.lineTo(x+13+i*12,y-12);ctx.lineTo(x+19+i*12,y);ctx.fill()}}}}
function drawPlayer(){let x=player.x-cameraX,y=player.y;if(player.inv>0&&Math.floor(frame/6)%2===0)return;let run=Math.sin(frame*.25)*8,leg=player.grounded?run:4,arm=player.grounded?-run:-8;ctx.save();if(player.star>0){ctx.shadowColor='#facc15';ctx.shadowBlur=18}ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(x+22,y+player.h+5,28,8,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#1e40af';ctx.lineWidth=7;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x+15,y+player.h-20);ctx.lineTo(x+8-leg,y+player.h);ctx.moveTo(x+30,y+player.h-20);ctx.lineTo(x+39+leg,y+player.h);ctx.stroke();ctx.fillStyle=player.fire?'#f97316':'#ef4444';round(x+7,y+20,34,player.h-24,9,true);ctx.fillStyle='#2563eb';ctx.fillRect(x+7,y+player.h-22,34,12);ctx.strokeStyle='#fbbf24';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(x+10,y+30);ctx.lineTo(x-3,y+38+arm);ctx.moveTo(x+39,y+30);ctx.lineTo(x+52,y+38-arm);ctx.stroke();ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(x+24,y+12,18,0,Math.PI*2);ctx.fill();ctx.fillStyle=player.fire?'#facc15':'#dc2626';ctx.beginPath();ctx.arc(x+24,y+4,18,Math.PI,Math.PI*2);ctx.fill();ctx.fillRect(x+12,y+1,30,8);ctx.fillStyle='#111827';ctx.beginPath();ctx.arc(x+18,y+12,3,0,Math.PI*2);ctx.arc(x+31,y+12,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+25,y+21,10,4,0,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawFlag(){let x=flag.x-cameraX;ctx.fillStyle='#fff';ctx.fillRect(x,flag.y,8,flag.h);ctx.fillStyle='#22c55e';ctx.beginPath();ctx.moveTo(x+8,flag.y+12);ctx.lineTo(x+92,flag.y+38);ctx.lineTo(x+8,flag.y+64);ctx.fill()}
function ui(){ctx.fillStyle='rgba(15,23,42,.84)';round(14,14,390,125,14,true);ctx.fillStyle='#fff';ctx.font='19px Arial';ctx.fillText('Level: '+level+'/10  '+worlds[level-1].name,30,45);ctx.fillText('Score: '+score+'   Coins: '+coins+'   Lives: '+lives,30,78);ctx.fillText('Power: '+(player.fire?'Fire':player.big?'Big':'Normal')+(keys.dash?'  RUN':''),30,111)}
function message(t,s,c){ctx.fillStyle='rgba(0,0,0,.76)';ctx.fillRect(0,0,W,H);ctx.fillStyle=c;ctx.font='44px Arial';ctx.textAlign='center';ctx.fillText(t,W/2,220);ctx.fillStyle='#fff';ctx.font='24px Arial';ctx.fillText(s,W/2,285);ctx.textAlign='left'}
function round(x,y,w,h,r,fill){ctx.beginPath();ctx.roundRect(x,y,w,h,r);if(fill)ctx.fill();else ctx.stroke()}
function draw(){ctx.clearRect(0,0,W,H);bg();drawPlatforms();drawBlocks();drawCoins();drawPowerups();drawShots();drawEnemies();drawFlag();drawPlayer();ui();if(gameState==='pause')message('PAUSED','Press P or Pause button','#38e8ff');if(gameState==='levelComplete')message('LEVEL COMPLETE','Loading next world...','#22c55e');if(gameState==='over')message('GAME OVER','Tap Jump or Restart','#ef4444');if(gameState==='winner')message('YOU WIN!','Score '+score+' | Coins '+coins,'#facc15')}
function loop(){frame++;update();draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
